{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Edit Grade — UoK SPM{% endblock %}
{% block content %}
<div class="mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Grade</h4>
  <p class="text-muted">Correcting: {{ grade.student.student_id }} — {{ grade.course.code }}</p>
</div>
<div class="card border-0 shadow-sm" style="max-width:700px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-check-circle me-2"></i>Update Grade
        </button>
        <a href="{% url 'grade_list' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
