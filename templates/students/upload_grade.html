{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Upload Grade — UoK SPM{% endblock %}
{% block content %}
<div class="mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Upload Grade</h4>
  <p class="text-muted">Enter student marks. SMS alerts will be sent automatically if below threshold.</p>
</div>
<div class="card border-0 shadow-sm" style="max-width:700px;">
  <div class="card-body p-4">
    <form method="post">{% csrf_token %}{{ form|crispy }}</form>
  </div>
</div>
{% endblock %}
