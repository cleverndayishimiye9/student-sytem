{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Change Password — UoK SPM{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-lock me-2 text-primary"></i>Change Password</h4>
<div class="card border-0 shadow-sm" style="max-width:480px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
    </form>
  </div>
</div>
{% endblock %}
